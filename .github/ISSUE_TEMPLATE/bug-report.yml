name: Bug Report
description: Report a bug in Context Warp Drive
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce, or a minimal code snippet
      placeholder: |
        ```ts
        // Minimal reproduction
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Context Warp Drive version
      placeholder: "git commit hash or version"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
    validations:
      required: false
